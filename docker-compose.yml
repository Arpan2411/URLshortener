version: '3.8'

services:
  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshortner-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/urlshortner
      - MONGO_USER=admin
      - MONGO_PASSWORD=admin123
      - MONGO_AUTH_SOURCE=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./src:/usr/src/app/src
      - ./package.json:/usr/src/app/package.json
      - ./package-lock.json:/usr/src/app/package-lock.json
      - /usr/src/app/node_modules
    networks:
      - urlshortner-network
    command: npm run dev

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: urlshortner-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=urlshortner
    command: ["--auth"]
    volumes:
      - mongodb-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - urlshortner-network

  # MongoDB Express (Web UI for MongoDB - Optional)
  mongo-express:
    image: mongo-express:latest
    container_name: urlshortner-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin123
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - urlshortner-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: urlshortner-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    networks:
      - urlshortner-network

  # Redis Commander (Web UI for Redis - Optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: urlshortner-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      # - REDIS_HOSTS=local:redis:6379
      # - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
        - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    depends_on:
      - redis
    networks:
      - urlshortner-network

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local

networks:
  urlshortner-network:
    driver: bridge